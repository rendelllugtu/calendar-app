    <script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwxj1-fULcNdA1ia3l1warDkY0lGGUCwdKD4oggkYXQmF83oiyEVv7azr1-IJCZTWrE/exec";

async function apiCall(action, payload = {}) {
  try {
    const formData = new URLSearchParams();

    formData.append("data", JSON.stringify({
      action,
      ...payload
    }));

    const response = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const text = await response.text();

    // Prevent crash if backend returns plain text
    try {
      return JSON.parse(text);
    } catch {
      throw new Error(text);
    }

  } catch (error) {
    console.error("API Error:", error);
    throw error;
  }
}

let heatmapWeekOffset = 0;

function changeHeatmapWeek(delta){
  heatmapWeekOffset += delta;
  renderRollingHeatmap();
}

function renderRollingHeatmap(){
const days = [];

/* Get next 14 days starting from Monday (including weekends for Mon-Sun display) */

let today = new Date();
today.setDate(today.getDate() + (heatmapWeekOffset * 7));

// Find the next Monday (or today if it's Monday)
let d = new Date(today);
const dayOfWeek = d.getDay(); // 0 = Sunday, 1 = Monday, etc.
if (dayOfWeek !== 1) {
  const daysUntilMonday = dayOfWeek === 0 ? 1 : (8 - dayOfWeek);
  d.setDate(d.getDate() + daysUntilMonday);
}

while(days.length < 14){

days.push(new Date(d));

d.setDate(d.getDate()+1);

}

const week1 = days.slice(0,7);
const week2 = days.slice(7,14);

// Update title with date range
const startDate = week1[0];
const endDate = week2[6];
const title = `📊 Staff Load (${startDate.toLocaleDateString('en-US',{month:'short',day:'numeric'})} - ${endDate.toLocaleDateString('en-US',{month:'short',day:'numeric'})})`;
document.getElementById('heatmapTitle').textContent = title;

const heat = {};

allEvents.forEach(ev=>{

const start = new Date(ev.start);

const end = ev.end
  ? new Date(new Date(ev.end).setDate(new Date(ev.end).getDate() - 1))
  : new Date(ev.start);

const assigned = ev.extendedProps.assigned || "";

assigned.split(",").forEach(name=>{

const staff = name.trim().toLowerCase();
if(!staff) return;

if(!heat[staff]) heat[staff] = Array(14).fill(0);

let current = new Date(start);

while(current <= end){

days.forEach((day,i)=>{

if(current.toDateString() === day.toDateString()){
heat[staff][i]++;
}

});

current.setDate(current.getDate()+1);

}

});

});

// Fetch unavailable staff for the date range
const unavailableMap = {};

(async () => {
  try {
    const startStr = startDate.toISOString().split('T')[0];
    const endStr = endDate.toISOString().split('T')[0];
    const unavailable = await apiCall("getUnavailableStaffForDateRange", {
      startDate: startStr,
      endDate: endStr
    });
    
    // Build unavailable map: key is "staffname|month-day"
    unavailable.forEach(entry => {
      const parts = entry.split('|');
      if (parts.length >= 2) {
        const staffName = parts[0].trim().toLowerCase();
        const dateStr = parts[1];
        const key = staffName + '|' + dateStr;
        unavailableMap[key] = true;
      }
    });
    
    // Re-render with unavailable data
    renderHeatmapWithUnavailable();
  } catch (err) {
    console.error("Failed to fetch unavailable staff:", err);
    renderHeatmapWithUnavailable();
  }
})();

function renderHeatmapWithUnavailable() {

function buildWeek(days,startIndex){

let html = `<div class="heat-week">`;

/* HEADER */

html+=`<div class="heat-header">`;

html+=`<div></div>`;

days.forEach(d=>{
html+=`<div style="text-align:center">
${d.toLocaleDateString("en",{weekday:"short"})}<br>${d.getDate()}
</div>`;
});

html+=`</div>`;


/* STAFF ROWS */

Object.entries(heat).forEach(([staff,data])=>{

html+=`<div class="heat-row">`;

html+=`<div class="staff-name">${toTitleCase(staff)}</div>`;

for(let i=0;i<7;i++){

const val=data[startIndex+i] || 0;

let cls="";

// Check if staff is unavailable on this day
const day = days[i];
const dateKey = (day.getMonth() + 1) + '-' + day.getDate();
const unavailKey = staff + '|' + dateKey;

if (unavailableMap[unavailKey]) {
  cls = "unavailable";
} else if(val>=3) cls="high";
else if(val>=2) cls="mid";
else if(val>=1) cls="low";

html+=`<div class="heat-cell ${cls}" title="${val} activities"></div>`;

}

html+=`</div>`;

});

html += `</div>`;

return html;

}


let html="";

html+=buildWeek(week1,0);
html+=buildWeek(week2,7);

document.getElementById("rollingHeatmap").innerHTML = html;

}

}

      if (status === "Rescheduled") title = "🔁 " + title;
      if (status === "Cancelled") title = "✖ " + title;
      if (status === "Not Conducted") title = "⚠ " + title;
      if (status === "Denied") title = "⚠ " + title;

      if (!assigned || assigned === "Unassigned") {
    status = "Unassigned";
  }

      return {
        ...ev,

        title: title,

        // ⭐ IMPORTANT: override both properties
        color: statusColors[status] || "#3788d8",
        backgroundColor: statusColors[status] || "#3788d8",
        borderColor: statusColors[status] || "#3788d8"

      };

    });

    allEvents = coloredEvents;

    successCallback(coloredEvents);
    renderRollingHeatmap();

  })
  .catch(err => {
    console.error(err);
    failureCallback(err);
  });

},

      // ===== Activity Update Modal =====
      document.getElementById("saveUpdate").onclick = async () => {

  const status = document.getElementById("activityStatus").value;
  const photoInput = document.getElementById("photoUpload");

  if (!photoInput) {
    alert("Photo input not found");
    return;
  }

  const files = Array.from(photoInput.files).slice(0, 3);
  const photos = [];

  let skippedFiles = 0;

  // 🔥 PROCESS FILES
  for (let file of files) {
    try {

      const isHeic =
        file.type.includes("heic") ||
        file.type.includes("heif") ||
        file.name.toLowerCase().endsWith(".heic");

      if (isHeic) {
        let convertedBlob = await heic2any({
          blob: file,
          toType: "image/jpeg",
          quality: 0.8
        });

        if (Array.isArray(convertedBlob)) {
          convertedBlob = convertedBlob[0];
        }

        file = new File(
          [convertedBlob],
          file.name.replace(/\.heic$/i, ".jpg"),
          { type: "image/jpeg" }
        );
      }

      const compressed = await compressImage(file);

      if (compressed && compressed.data) {
        photos.push(compressed);
      } else {
        skippedFiles++;
      }

    } catch (err) {
      console.warn("Skipping file:", file.name, err);
      skippedFiles++;
    }
  }

  if (photos.length === 0 && files.length > 0) {
    alert("No valid images could be processed.");
    return;
  }

  // 🔥 CALL SUBMIT FUNCTION
  handleSubmitWithGPS(status, photos);
};

  function handleSubmitWithGPS(status, photos) {

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        submitUpdateWithPhotos(status, photos, {
          lat: pos.coords.latitude,
          lon: pos.coords.longitude
        });
      },
      () => {
        console.warn("GPS unavailable. Continuing without GPS.");
        submitUpdateWithPhotos(status, photos, null);
      }
    );
  } else {
    submitUpdateWithPhotos(status, photos, null);
  }
}

  function submitUpdateWithPhotos(status, photos, gpsData) {

  showLoading(true);

  apiCall("updateActivityStatus", {
    rowId: currentRowId,
    status: status,
    photos: photos,
    gps: gpsData
  })
  .then((res) => {
    showLoading(false);

    console.log("Server response:", res);

    if (!res || res.error) {
  alert("Error: " + (res?.error || "Unknown error"));
  return;
}

  if (!res.success) {
  alert("Error: " + (res.message || "Unknown error"));
  return;
}

    alert(res.message);

    document.body.classList.remove("modal-open");
    document.getElementById("updateModal").style.display = "none";

    calendar.refetchEvents();
    setTimeout(renderRollingHeatmap, 300);
  })
  .catch((err) => {
    showLoading(false);
    console.error(err);
    alert("Error updating activity.");
  });
}

      function showLoading(show) {
        document.getElementById("loadingOverlay").style.display = show ? "block" : "none";
      }

      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
        });
      }
      
      function compressImage(file, maxWidth = 600, quality = 0.4) {
  return new Promise((resolve) => {

    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {

      let width = img.width;
      let height = img.height;

      // Maintain aspect ratio
      if (width > maxWidth) {
        height *= maxWidth / width;
        width = maxWidth;
      }

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      const compressedDataUrl = canvas.toDataURL("image/jpeg", quality);

      const base64 = compressedDataUrl.split(",")[1];

      console.log("Compressed size (approx KB):", Math.round(base64.length * 0.75 / 1024));

      resolve({
        data: base64,
        mimeType: "image/jpeg"
      });
    };

    reader.readAsDataURL(file);
  });
}
